<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>

        body{
            font-family: Arial;
            margin: 0px;
            background-color: black;
        }

        .send-button{
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-left: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        .chat-input{
            font-size: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            border-width: 1px;
            flex-grow: 1;
        }

        .input-container{
            display: flex;   
            margin-bottom: 60px;
            
        }

        .app-container{
            max-width: 600px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
           
        }

        .chat-message-user{
            display: flex;
            justify-content: flex-end;
            align-items: start;
        }

        .chat-message-robot{
            display: flex;
            align-items: start;
         }

        .chat-message-text{
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin: 0px 10px 0px 10px;
            margin-bottom: 20px;
            max-width: 300px;
            
        }

        .chat-message-profile{
            width: 45px;
        }

        .chat-messages-container{
             flex-grow: 1;
             margin-top: 25px;
             overflow: scroll;
             scrollbar-width: none;
        }
        


    </style>
  </head>
  <body>
    <div class="js-container"></div>



    <script src="react-1.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>


    <script type="text/babel">
      

    // ChatInput Component

    function ChatInput({ chatMessages,setChatMessages }){

        const [inputText,setInputText] = React.useState('');


        function saveInputText(event){
            // event.target = gives us the element that we are typing in
            const value = event.target.value;
            setInputText(value);
        }

        function sendMessage(){

            const newChatMessages = [
                ...chatMessages,
                {
                    message : inputText,
                    sender  : 'user',
                    id      : crypto.randomUUID()
                }
            ]


            setChatMessages(newChatMessages);


            const response = Chatbot.getResponse(inputText);    // responses come from external library

              setChatMessages([
                ...newChatMessages,
                {
                    message : response,
                    sender  : 'robot',
                    id      : crypto.randomUUID()
                }
            ]);
            

            setInputText('');

        }



        return (
            <div className="input-container">
               <input 
                    className = "chat-input"
                    type="text" 
                    placeholder="Send a message to Chatbot" 
                    size="30"
                    //onChange = runs a function when we changes the text inside an <input>
                    onChange = {saveInputText}
                    value    = {inputText}
                />

                <button
                    onClick = {sendMessage}
                    className = "send-button"
                
                >Send</button>
            </div>

        );
    }  




    function ChatMessage({ message, sender }){
        
        return (

        <div className = {sender==='user' ? 'chat-message-user' : 'chat-message-robot'}>

            {sender==='robot' &&  (
                <img src="robot.png" className="chat-message-profile"  alt="" />
            )}

            <div className="chat-message-text">
                {message}
            </div>

            {sender==='user'  &&   (
                <img src="user.png" className="chat-message-profile"  />
             )}
      
        </div>

        );

    }

   

    // ChatMessages component

    function ChatMessages({ chatMessages }){
        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
            const containerElem = chatMessagesRef.current;
            if(containerElem){
                containerElem.scrollTop = containerElem.scrollHeight;
            }


        },[chatMessages])


        return(
            <div className="chat-messages-container" ref={chatMessagesRef}> 

            {chatMessages.map((chatMessage) => {
                return(
                    <ChatMessage 
                        message = {chatMessage.message}
                        sender  = {chatMessage.sender}  
                        key     = {chatMessage.id}
                    />        
                );

                })}

            </div>
        );
    }


    // main component

    function App(){
        //const array = React.useState([{
        const [chatMessages,setChatMessages] = React.useState([{
            message : 'hello chatbot' ,
            sender : 'user',
            id : crypto.randomUUID()
        },{
            message : 'Hello! How can I help you?' ,
            sender : 'robot' ,
            id : crypto.randomUUID()

        },{
            message : 'test',
            sender : 'user' ,
            id : crypto.randomUUID()

        },{
            message : 'Sorry, I didnt quite understand that. Currently, I only know how to flip a coin, roll a dice, or get todays date. Let me know how I can help!', 
            sender : 'robot',
            id : crypto.randomUUID()
        }]);

        return(
        <div className="app-container">

            <ChatMessages 
                chatMessages = {chatMessages} 
            />

             <ChatInput 
                chatMessages    = {chatMessages}
                setChatMessages = {setChatMessages} 
            />
        </div>

        );
    }




    const container = document.querySelector('.js-container');

    ReactDOM.createRoot(container).render(<App />);

    
    </script>
  </body>
</html>
</html>
